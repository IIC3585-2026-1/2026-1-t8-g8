<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pestaña Grupal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="board-page">

    <header class="board-header">
      <div class="board-header-left">
        <span id="group-label">Grupo</span>
      </div>
      <div class="board-header-right">
        <span>Usuarios: <span id="user-count">0</span></span>
        <span id="timer-display">—:--</span>
      </div>
    </header>

    <div class="board-canvas-wrap">
      <canvas id="board"></canvas>
      <div class="locked-overlay" id="locked-overlay">
        <strong>Tiempo terminado</strong>
        <span>Ya no se puede seguir dibujando</span>
      </div>
    </div>

    <div class="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" id="tool-pencil">
          <i data-lucide="pencil"></i>
        </button>

        <button class="tool-btn" id="tool-eraser">
          <i data-lucide="eraser"></i>
        </button>
      </div>

      <div class="divider"></div>

      <div class="swatches" id="swatches">
        <button class="color-swatch active" data-color="black" style="background:black"></button>
        <button class="color-swatch" data-color="red" style="background:red"></button>
        <button class="color-swatch" data-color="green" style="background:green"></button>
        <button class="color-swatch" data-color="blue" style="background:blue"></button>
        <button class="color-swatch" data-color="yellow" style="background:yellow"></button>
      </div>
      <input type="color" id="custom-color" value="#1f2430" title="Color personalizado" />

      <div class="divider"></div>

      <div class="size-group">
        <span>Grosor</span>
        <input type="range" id="size-slider" min="1" max="6" value="2" />
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/board.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
